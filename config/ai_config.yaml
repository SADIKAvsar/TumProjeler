# ============================================================================
# LoA Bot AI Agent Configuration (Local-Only)
# ============================================================================
# This file is local-first. Cloud Gemini settings were removed.
# Runtime is expected to use local Ollama + local PyTorch stack.

ai_settings:
  # Master toggle
  enabled: true

  # If AI output is unusable, continue with rule-based logic
  fallback_to_rules: true

  # AI runs but does not control bot (test mode)
  observer_mode: false

  # Local VLM backend (Ollama)
  ollama:
    enabled: true
    endpoint: "http://localhost:11434"
    model_name: "qwen2.5-vl"
    temperature: 0.1
    max_tokens: 512
    top_p: 0.8
    top_k: 40
    timeout_seconds: 30

  # Local runtime guards (non-billing, non-cloud)
  runtime_limits:
    calls_per_minute: 30
    calls_per_hour: 1000

  # Decision cache
  caching:
    decision_ttl_seconds: 60
    screenshot_ttl_seconds: 30
    max_cache_size: 100

  # Confidence thresholds (0.0-1.0)
  confidence_thresholds:
    boss_selection: 0.6
    freeze_diagnosis: 0.7
    strategic_wait: 0.5
    event_priority: 0.6
    loot_optimization: 0.5

  # Feature switches
  features:
    boss_selection: true
    strategic_wait: true
    freeze_diagnosis: true
    event_priority: false
    loot_optimization: false
    pvp_detection: false

  # Screenshot preprocess for local VLM input
  screenshot:
    quality: 50
    resize_width: 1280
    resize_height: 720
    format: "JPEG"

  # Local memory and history
  memory:
    file_path: "D:\\LoABot_Training_Data\\runtime_data\\ai_memory.json"
    history_file: "D:\\LoABot_Training_Data\\runtime_data\\decision_history.jsonl"
    save_interval_seconds: 300
    backup_interval_hours: 24
    max_backups: 7

  # Logging
  logging:
    level: "INFO"
    separate_file: true
    file_path: "D:\\LoABot_Training_Data\\runtime_data\\logs\\ai_decisions.log"
    log_prompts: false
    log_responses: false

  # Metrics
  metrics:
    enabled: true
    file_path: "D:\\LoABot_Training_Data\\runtime_data\\ai_metrics.json"
    save_interval_seconds: 600

# ============================================================================
# Prompt Template Paths
# ============================================================================
prompts:
  boss_selection: "prompts/boss_selection.txt"
  freeze_diagnosis: "prompts/freeze_diagnosis.txt"
  strategic_wait: "prompts/strategic_wait.txt"
  event_priority: "prompts/event_priority.txt"
  loot_optimization: "prompts/loot_optimization.txt"
  unknown_state: "prompts/unknown_state_recovery.txt"

# ============================================================================
# Advanced
# ============================================================================
advanced:
  api_timeout_seconds: 30

  retry:
    max_attempts: 3
    backoff_factor: 2.0
    max_backoff_seconds: 60

  preprocessing:
    sharpen: false
    enhance_contrast: false
    grayscale: false
