# click_map.yaml — Alamet Faz + Aksiyon → Tıklama Koordinatı
# ============================================================
# Alamet modeli "mouse_click" kararı verdiğinde nereye tıklanacak?
#
# Anahtar format: "FAZ_ADI|aksiyon_adi"
# Faz isimleri: COMBAT_PHASE, EVENT_PHASE, LOOT_PHASE, NAV_PHASE,
#               STARTUP_SYNC, SYSTEM_RECOVERY, UNKNOWN_PHASE
#
# coord: GeminiProConfig.yaml koordinatlarından alınmıştır.
# source: "yaml_auto" = config'den türetildi, "yaml_manual" = elle girildi
#
# Bot çalışırken gözlemlenen tıklamalar models/active_model/click_knowledge.json'a
# kaydedilir ve bu YAML'ın yerini alır (daha yüksek öncelik).

# ── COMBAT_PHASE ─────────────────────────────────────────────────────────
# Savaş fazında mouse_click: genellikle kat geçiş butonu
COMBAT_PHASE|mouse_click:
  coord: {x: 1848, y: 1078}   # kata_gec butonu
  label: kata_gec
  source: yaml_auto

# ── EVENT_PHASE ──────────────────────────────────────────────────────────
# Etkinlik fazında mouse_click: ileri / devam butonu
EVENT_PHASE|mouse_click:
  coord: {x: 1276, y: 108}    # ileri_tik
  label: ileri_tik
  source: yaml_auto

# ── LOOT_PHASE ───────────────────────────────────────────────────────────
# Loot fazında mouse_click: ileri / kapat butonu
LOOT_PHASE|mouse_click:
  coord: {x: 1276, y: 108}    # ileri_tik
  label: ileri_tik
  source: yaml_auto

# ── NAV_PHASE ────────────────────────────────────────────────────────────
# Navigasyon fazında mouse_click: genel etkinlik noktası
NAV_PHASE|mouse_click:
  coord: {x: 1278, y: 1035}   # common_event_point
  label: common_event_point
  source: yaml_auto

# ── STARTUP_SYNC ─────────────────────────────────────────────────────────
# Başlangıç senkronizasyonu: ekran merkezi (fallback)
STARTUP_SYNC|mouse_click:
  coord: {x: 1280, y: 720}    # ekran ortası
  label: screen_center
  source: yaml_manual

# ── SYSTEM_RECOVERY ──────────────────────────────────────────────────────
# Sistem kurtarma fazı: ekran merkezi (fallback)
SYSTEM_RECOVERY|mouse_click:
  coord: {x: 1280, y: 720}    # ekran ortası
  label: screen_center
  source: yaml_manual

# ── UNKNOWN_PHASE ────────────────────────────────────────────────────────
# Bilinmeyen faz: ekran merkezi (son çare)
UNKNOWN_PHASE|mouse_click:
  coord: {x: 1280, y: 720}    # ekran ortası
  label: screen_center
  source: yaml_manual

# ── Ek Aksiyonlar (gelecek kullanım) ─────────────────────────────────────
# Ollama veya başka bir model "mouse_click" dışında koordinat gerektirirse:
# COMBAT_PHASE|seq_boss_secimi:
#   coord: {x: 2298, y: 444}    # boss_list_ac
#   label: boss_list_ac
#   source: yaml_auto
