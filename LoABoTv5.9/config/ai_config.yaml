# ============================================================================
# LoA Bot AI Agent Configuration
# ============================================================================
# Local-first modda cloud API kullanimi devre disidir.
# Bu dosya Google Gemini Vision API tabanlı AI ajanı için ayarları içerir.

ai_settings:
  # AI sistemini aktifleştir/devre dışı bırak
  enabled: true

  # AI başarısız olduğunda eski kural tabanlı sisteme geri dön
  fallback_to_rules: true

  # Observer mode: AI çalışır ama bot kontrol etmez (test için)
  observer_mode: false

  # Google Gemini API Ayarları
  gemini:
    # API key'inizi buraya yapıştırın (GEMINI_API_SETUP.md'ye bakın)
    api_key: "LOCAL_ONLY_UNUSED"

    # Model seçimi (gemini-2.0-flash önerilir: hızlı ve ucuz)
    model_name: "gemini-2.0-flash"

    # AI yaratıcılığı (0.0-1.0, düşük = tutarlı kararlar)
    temperature: 0.2

    # Maksimum response uzunluğu (token)
    max_tokens: 512

    # Top-p sampling (0.0-1.0)
    top_p: 0.8

    # Top-k sampling
    top_k: 40

  # API Kullanım Limitleri (maliyet kontrolü)
  rate_limits:
    # Dakika başına maksimum API çağrısı
    calls_per_minute: 5

    # Saat başına maksimum API çağrısı
    calls_per_hour: 120

    # Günlük maksimum maliyet ($)
    daily_cost_limit_usd: 5.0

    # Aylık maksimum maliyet ($)
    monthly_cost_limit_usd: 50.0

  # Cache Ayarları (aynı durumda aynı karar = API tasarrufu)
  caching:
    # Karar cache süresi (saniye)
    decision_ttl_seconds: 60

    # Screenshot cache süresi (saniye)
    screenshot_ttl_seconds: 30

    # Cache boyutu (entry sayısı)
    max_cache_size: 100

  # AI Güven Eşikleri (0.0-1.0)
  # AI'nın güveni bu değerlerin altındaysa kural tabanlı sisteme geçilir
  confidence_thresholds:
    # Boss seçimi için minimum güven
    boss_selection: 0.6

    # Donma teşhisi için minimum güven
    freeze_diagnosis: 0.7

    # Stratejik bekleme kararı için minimum güven
    strategic_wait: 0.5

    # Event önceliği için minimum güven
    event_priority: 0.6

    # Loot optimizasyonu için minimum güven
    loot_optimization: 0.5

  # Özellik Anahtarları (hangi AI özellikleri aktif?)
  features:
    # AI tabanlı boss seçimi
    boss_selection: true

    # AI tabanlı stratejik bekleme kararı
    strategic_wait: true

    # AI tabanlı donma teşhisi
    freeze_diagnosis: true

    # AI tabanlı event önceliklendirme (Phase 2)
    event_priority: false

    # AI tabanlı loot optimizasyonu (Phase 3)
    loot_optimization: false

    # AI tabanlı PvP threat detection (Phase 3)
    pvp_detection: false

  # Screenshot Ayarları
  screenshot:
    # Screenshot kalitesi (1-100, düşük = küçük dosya = ucuz)
    quality: 50

    # AI'ya gönderilmeden önce resize (pixel)
    resize_width: 1280
    resize_height: 720

    # Screenshot formatı
    format: "JPEG"

  # Hafıza ve Öğrenme
  memory:
    # Hafıza dosyası yolu
    file_path: "E:\\LoABot_Training_Data\\runtime_data\\ai_memory.json"

    # Karar geçmişi dosyası
    history_file: "E:\\LoABot_Training_Data\\runtime_data\\decision_history.jsonl"

    # Hafızayı kaydetme sıklığı (saniye)
    save_interval_seconds: 300

    # Hafıza backup yapma sıklığı (saat)
    backup_interval_hours: 24

    # Backup dosyası sayısı (eski backuplar silinir)
    max_backups: 7

  # Loglama
  logging:
    # AI kararlarını loglama seviyesi (DEBUG, INFO, WARNING, ERROR)
    level: "INFO"

    # AI logları ayrı dosyaya yazsın mı?
    separate_file: true

    # AI log dosyası yolu
    file_path: "E:\\LoABot_Training_Data\\runtime_data\\logs\\ai_decisions.log"

    # Prompts'ları loglasın mı? (debugging için)
    log_prompts: false

    # API responses'ları loglasın mı? (debugging için)
    log_responses: false

  # Performans Metrikleri
  metrics:
    # Metrikleri kaydet
    enabled: true

    # Metrik dosyası yolu
    file_path: "E:\\LoABot_Training_Data\\runtime_data\\ai_metrics.json"

    # Metrikleri kaydetme sıklığı (saniye)
    save_interval_seconds: 600

# ============================================================================
# Prompt Template Paths
# ============================================================================
prompts:
  boss_selection: "prompts/boss_selection.txt"
  freeze_diagnosis: "prompts/freeze_diagnosis.txt"
  strategic_wait: "prompts/strategic_wait.txt"
  event_priority: "prompts/event_priority.txt"
  loot_optimization: "prompts/loot_optimization.txt"
  unknown_state: "prompts/unknown_state_recovery.txt"

# ============================================================================
# Advanced Settings (Değiştirmeyin - uzman kullanıcılar için)
# ============================================================================
advanced:
  # API timeout (saniye)
  api_timeout_seconds: 30

  # Retry stratejisi
  retry:
    max_attempts: 3
    backoff_factor: 2.0
    max_backoff_seconds: 60

  # Image preprocessing
  preprocessing:
    # Görüntüyü keskinleştir
    sharpen: false

    # Kontrast artır
    enhance_contrast: false

    # Gri tonlamaya çevir (renkli daha iyi)
    grayscale: false
